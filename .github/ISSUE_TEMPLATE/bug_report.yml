name: Bug report
description: Report incorrect behavior, crashes, invalid query output, or unexpected validation results.
title: "bug: "
labels:
  - "type: bug"
  - "status: needs triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproducible example so we can investigate quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this with the latest released version or the current main branch.
          required: true
        - label: I included a minimal query contract, query string, and expected behavior.
          required: true

  - type: input
    id: paramora-version
    attributes:
      label: Paramora version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.14.4"
    validations:
      required: true

  - type: input
    id: backend
    attributes:
      label: Backend
      placeholder: "MongoDB / mongomock / custom emitter"
    validations:
      required: true

  - type: textarea
    id: contract
    attributes:
      label: Query contract
      description: Paste the smallest QueryContract that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: query-string
    attributes:
      label: Query parameters
      description: Paste the exact query string or params dict.
      render: text
      placeholder: "?price__gte=10&sort=-created_at&limit=10"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      render: text
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide a small runnable snippet, pytest test, or FastAPI route.
      render: python
    validations:
      required: false
