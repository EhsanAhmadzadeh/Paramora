name: Feature request
description: Suggest a new user-facing capability or improvement.
title: "feat: "
labels:
  - "type: feature"
  - "status: needs design"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Paramora prioritizes safe, typed, maintainable query compilation for FastAPI.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched existing issues and discussions first.
          required: true
        - label: This feature fits Paramora's goal of safe typed query compilation.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: |
        I want to allow users to filter by case-insensitive text without exposing raw Mongo operators.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you want.
      render: python
      placeholder: |
        class ItemQuery(QueryContract):
            name: Annotated[str, query_field("icontains")]
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Contracts
        - Parser
        - Coercion
        - Errors
        - MongoDB backend
        - FastAPI integration
        - Typing
        - Packaging
        - Documentation
        - Testing
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other designs or workarounds did you consider?
      placeholder: |
        I considered using loose mode, but that does not provide strict operator validation.
    validations:
      required: false

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Would this affect public APIs, error shapes, AST contracts, or backend emitter behavior?
      placeholder: |
        This would add a new operator but should not break existing behavior.
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Usage examples
      description: Show how developers would use this feature.
      render: python
    validations:
      required: false
