name: Feature request
description: Suggest a new user-facing capability or improvement.
title: "feat: "
labels:
  - "type: feature"
  - "status: needs design"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Paramora prioritizes safe, typed, maintainable query compilation for FastAPI.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched existing issues and discussions first.
          required: true
        - label: This feature fits Paramora's goal of safe typed query compilation.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you want.
      render: python
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Contracts
        - Parser
        - Coercion
        - Errors
        - MongoDB backend
        - FastAPI integration
        - Typing
        - Packaging
        - Documentation
        - Testing
        - Performance
        - Other
    validations:
      required: true
