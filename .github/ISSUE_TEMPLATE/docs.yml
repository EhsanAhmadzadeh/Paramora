name: Documentation issue
description: Report missing, confusing, outdated, or incorrect documentation.
title: "docs: "
labels:
  - "type: documentation"
  - "area: docs"
  - "status: needs triage"
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I checked the README and docs directory.
          required: true

  - type: dropdown
    id: docs-area
    attributes:
      label: Documentation area
      options:
        - README
        - Quickstart
        - Query contracts
        - Query syntax
        - Error handling
        - MongoDB backend
        - Development with uv
        - Testing
        - Profiling / Rust hotspot planning
        - Architecture
        - Contributing
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested improvement
    validations:
      required: false
